<html lang="sk">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <header>
    <h1>Barista Caffee</h1>
    <h2>Najlepšia káva v meste!</h2>

<h2><b>Vyplnte prosím Vašu objednávku:</b></h2>
<form class="row g-3">
  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Meno</label>
    <input type="text" class="form-control" id="inputEmail4">
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Objednávka</label>
    <input type="text" class="form-control" id="objednavka">
  </div>
  <div class="col-12">
    <label for="inputAddress" class="form-label">Adresa</label>
    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
  </div>
  <div class="col-12">
    <label for="inputAddress2" class="form-label">Adresa 2</label>
    <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
  </div>
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Mesto</label>
    <input type="text" class="form-control" id="inputCity">
  </div>
  <div class="col-md-2">
    <label for="inputZip" class="form-label">PSČ</label>
    <input type="text" class="form-control" id="inputZip">
  </div>
  <div class="col-12">
    <button type="submit" class="button">Odoslať</button>
  </div>
  <a href="index.html" class="btn btn-outline-secondary">späť</a>
</form>

    <p> Tešime sa na Vás!</p>
  <p> - Tím, Barista Caffee</p>

 </footer>
