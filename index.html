<!doctype html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <title>Barista Coffee</title>
    <link rel="stylesheet" href="css/style.css">
  <link href="bootstrap.min.css" rel="stylesheet">
<link href="style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="d-flex justify-content-between align-items-center">
    <h1><b>Barista Coffee</b></h1>

    <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-secondary" type="submit">Search</button>
    </form>
</header>
<section>
    <p class="subtitle">Kaviareň</p>
    <h1>Ráno začína s nami, vy, my a káva</h1>
</section>
<section class="products">
    <h2>Naša ponuka</h2>

    <div class="gallery">

        <div class="card">
            <img src="img/espresso.png" alt="Espresso">
            <div class="info">
                <h3>Julius Meinl Espresso</h3>
                <span>8,90 €</span>
            </div>
        </div>

        <div class="card">
            <img src="img/espresso2.png" alt="Drip">
            <div class="info">
                <h3>Julius Meinl Drip</h3>
                <span>12,50 €</span>
            </div>
          </div>
    </div>
</section>
<form class="order">
    <h2>Objednávka</h2>
    <p class="subtitle">VYPLŇTE ÚDAJE A MY SA VÁM OZVEME</p>

    <input type="text" id="meno" placeholder="Ján Novák">

    <input type="email" placeholder="jan@example.sk">

    <input type="tel" placeholder="+421 900 000 000">

    <select>
        <option>Vyberte kávu...</option>
        <option>Espresso 250g</option>
        <option>Espresso 500g</option>
    </select>

    <input type="number" value="1">

    <textarea rows="5" placeholder="Mletie, spôsob prípravy..."></textarea>
<button type="submit" id="orderform221">
    ODOSLAŤ OBJEDNÁVKU
</button>
</form>
  <footer>
    <p> <b>Tešíme sa na Vás! </b><br> - Tím Barista Coffee</p>
    <a href="https://juliusmeinl.com/sk" class="link"target="_blank" rel="noopener noreferrer">
    Julius Meinl Slovensko</a>
    <br>
    <a href="kontakt.html" class="button">Kontakt</a>
 </footer>
<script src="objednavka.js"></script>
</body>
</html>
